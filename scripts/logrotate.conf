# cTrader Bot - User-space logrotate configuration
# Managed by: scripts/rotate_logs.sh (called on startup and hourly via cron)
# Uses copytruncate: safe for running processes with persistent >> redirects
# ─────────────────────────────────────────────────────────────────────────────

# HUD console: high-volume tabbed UI output (~500MB if unchecked)
/home/renierdejager/Documents/ctrader_trading_bot/logs/hud_console.log {
    size 50M
    rotate 3
    compress
    delaycompress
    copytruncate
    missingok
    notifempty
}

# Bot daemon console: subprocess stdout/stderr
/home/renierdejager/Documents/ctrader_trading_bot/logs/bot_console.log {
    size 50M
    rotate 3
    compress
    delaycompress
    copytruncate
    missingok
    notifempty
}

# Bot structured log
/home/renierdejager/Documents/ctrader_trading_bot/logs/bot.log {
    size 20M
    rotate 5
    compress
    delaycompress
    copytruncate
    missingok
    notifempty
}

# HUD output log
/home/renierdejager/Documents/ctrader_trading_bot/logs/hud_output.log {
    size 20M
    rotate 3
    compress
    delaycompress
    copytruncate
    missingok
    notifempty
}

# Market monitor
/home/renierdejager/Documents/ctrader_trading_bot/logs/market_monitor.log {
    size 10M
    rotate 3
    compress
    delaycompress
    copytruncate
    missingok
    notifempty
}

# Misc runtime logs (startup, restart, bot_output)
/home/renierdejager/Documents/ctrader_trading_bot/logs/bot_output.log
/home/renierdejager/Documents/ctrader_trading_bot/logs/restart.log
/home/renierdejager/Documents/ctrader_trading_bot/logs/startup.log {
    size 5M
    rotate 3
    compress
    delaycompress
    copytruncate
    missingok
    notifempty
}

# FIX QUOTE message log: heavy price-feed traffic - keep small, 2 rotations only
/home/renierdejager/Documents/ctrader_trading_bot/log/QUOTE/*.log {
    size 100M
    rotate 2
    compress
    delaycompress
    copytruncate
    missingok
    notifempty
}

# FIX TRADE message log: trade audit trail - keep more history
/home/renierdejager/Documents/ctrader_trading_bot/log/TRADE/*.log {
    size 50M
    rotate 5
    compress
    delaycompress
    copytruncate
    missingok
    notifempty
}
