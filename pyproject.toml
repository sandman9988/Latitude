[tool.black]
line-length = 120
target-version = ["py312"]
include = "\\.pyi?$"
exclude = """
/(\
    \\.git
  | \\.mypy_cache
  | \\.ruff_cache
  | \\.venv
  | build
  | dist
  | data
  | exports
  | logs
  | __pycache__
)/
"""

[tool.isort]
profile = "black"
line_length = 120
force_single_line = false
combine_as_imports = true
known_first_party = []
include_trailing_comma = true
skip_gitignore = true

[tool.ruff]
line-length = 120
target-version = "py312"
respect-gitignore = true
exclude = [
  ".git",
  ".mypy_cache",
  ".ruff_cache",
  ".venv",
  "build",
  "dist",
  "data",
  "exports",
  "logs",
  "__pycache__",
]

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "F",   # pyflakes
  "I",   # isort imports
  "B",   # bugbear
  "UP",  # pyupgrade
  "SIM", # simplify
  "PL",  # pylint-inspired
  "W",   # pycodestyle warnings
]
ignore = [
  "E203", # whitespace before ':' (black compatible)
  "E501", # line length handled by formatter
]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
warn_return_any = true
warn_unused_ignores = true
warn_redundant_casts = true
strict_optional = true
show_error_codes = true
allow_redefinition = false
plugins = []
