[DEFAULT]
ConnectionType=initiator
BeginString=FIX.4.4

SenderCompID=demo.pepperstone.5179095
TargetCompID=cServer
TargetSubID=QUOTE

HeartBtInt=15
ReconnectInterval=5
ResetOnLogon=Y
ResetOnLogout=Y
ResetOnDisconnect=Y

# Connection stability
SocketConnectTimeout=10
SocketAcceptPort=0
LogonTimeout=10
LogoutTimeout=5

FileStorePath=store/QUOTE
FileLogPath=logs/fix/QUOTE

UseDataDictionary=Y
DataDictionary=/home/renierdejager/Projects/ctrader_trading_bot/config/FIX44_ctrader.xml

# cTrader FIX compatibility - relax validation for broker-specific messages
ValidateFieldsOutOfOrder=N
ValidateFieldsHaveValues=N
ValidateUserDefinedFields=N
AllowUnknownMsgFields=Y

StartTime=00:00:00
EndTime=23:59:59

# SSL is typically required for cTrader FIX; keep if your venue requires it.
UseSSL=Y

[SESSION]
SessionQualifier=QUOTE
TargetSubID=QUOTE

# Primary host (US Equinix DC)
SocketConnectHost=demo-us-eqx-01.p.c-trader.com
SocketConnectPort=5201

# Failover host 1 (alternative endpoint)
SocketConnectHost1=demo-eu-ld4-01.p.c-trader.com
SocketConnectPort1=5201

# Failover host 2 (backup)
SocketConnectHost2=demo-ap-sy3-01.p.c-trader.com
SocketConnectPort2=5201
